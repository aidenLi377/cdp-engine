<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>人群包配置生成器 (基石修复版)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .sidebar { height: 100vh; background: #fff; border-right: 1px solid #dee2e6; overflow-y: auto; }
        .nav-link { cursor: pointer; color: #495057; padding: 15px; border-bottom: 1px solid #f1f1f1; }
        .nav-link:hover { background-color: #e9ecef; }
        .nav-link.active { background-color: #0d6efd; color: white; font-weight: bold; }

        /* 高性能组件样式 */
        .search-multi-box { border: 1px solid #ced4da; border-radius: 4px; padding: 10px; background: #fff; }
        .checkbox-scroll-area { height: 200px; overflow-y: auto; border: 1px solid #eee; padding: 5px; background: #fafafa; }

        .checkbox-group-container { display: flex; flex-wrap: wrap; gap: 10px; }
        .checkbox-btn { display: none; }
        .checkbox-btn + label {
            cursor: pointer; padding: 6px 12px; border: 1px solid #ced4da; border-radius: 20px;
            background: white; color: #555; transition: all 0.2s; user-select: none; font-size: 0.9em;
        }
        .checkbox-btn:checked + label { background-color: #e7f1ff; border-color: #0d6efd; color: #0d6efd; font-weight: bold; }

        /* 显隐动画 */
        .field-wrapper { transition: all 0.3s; opacity: 1; }
        .field-wrapper.hidden { display: none !important; }

        pre { background: #2d2d2d; color: #83c379; padding: 15px; border-radius: 5px; height: 100%; overflow: auto; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-0">
            <div class="p-3 bg-dark text-white fw-bold">📦 人群包列表</div>
            <div id="packageList" class="list-group list-group-flush"></div>
        </div>

        <div class="col-md-10 p-4" style="height: 100vh; overflow-y: auto;">
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
                <h4 id="currentPackageTitle" class="text-primary m-0">请选择左侧人群包...</h4>
                <button onclick="submitForm()" class="btn btn-success" id="genBtn" disabled>🚀 生成 JSON</button>
            </div>

            <div class="row">
                <div class="col-md-7">
                    <div class="card shadow-sm mb-5">
                        <div class="card-body">
                            <form id="dynamicForm">
                                <div id="formContainer" class="text-muted text-center py-5">等待选择...</div>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="col-md-5">
                    <div class="card shadow-sm h-100" style="max-height: 800px;">
                        <div class="card-header bg-secondary text-white">JSON 预览</div>
                        <div class="card-body p-0">
                            <pre id="jsonResult" class="m-0 border-0">...</pre>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let activePackage = "";
    let logicMatrix = {};
    const optionCache = {};
    const selectionCache = {};

    window.onload = async () => {
        const res = await fetch('/api/packages');
        const packages = await res.json();
        const listEl = document.getElementById('packageList');
        packages.forEach(pkg => {
            const div = document.createElement('div');
            div.className = 'nav-link';
            div.textContent = pkg;
            div.onclick = () => loadPackage(pkg, div);
            listEl.appendChild(div);
        });
    };

    async function loadPackage(pkgName, el) {
        document.querySelectorAll('.nav-link').forEach(d => d.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('currentPackageTitle').textContent = pkgName;
        activePackage = pkgName;

        const container = document.getElementById('formContainer');
        container.innerHTML = '<div class="spinner-border spinner-border-sm"></div> 加载配置...';

        // 调用新的 Meta 接口
        const res = await fetch(`/api/meta/${pkgName}`);
        const data = await res.json();

        logicMatrix = data.matrix;
        const schema = data.schema;

        container.innerHTML = '';
        document.getElementById('genBtn').disabled = false;

        // 清空缓存
        for (let key in selectionCache) delete selectionCache[key];

        // 排序：默认字段优先
        const sortedSchema = schema.sort((a, b) => {
            if (a.isDefault && !b.isDefault) return -1;
            if (!a.isDefault && b.isDefault) return 1;
            return 0;
        });

        // 渲染所有字段
        sortedSchema.forEach(field => {
            renderField(container, field);
        });

        // 【关键】触发展示逻辑
        updateVisibility();
    }

    function renderField(container, field) {
        const wrapper = document.createElement('div');
        wrapper.className = 'mb-4 field-wrapper';
        wrapper.id = `field_wrapper_${field.key}`;

        // 绑定默认属性
        wrapper.dataset.isDefault = field.isDefault;

        const labelText = field.Label + (field.isDefault ? ' <span class="text-danger">*</span>' : '');
        const label = `<label class="form-label fw-bold">${labelText}</label>`;
        let widgetHtml = '';

        // 1. 搜索多选 (带缓存)
        if (field.Widget_Type === '搜索多选') {
            optionCache[field.key] = field.options || [];
            selectionCache[field.key] = new Set();
            widgetHtml = `
                <div class="search-multi-box">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <input type="text" class="form-control form-control-sm"
                               placeholder="搜索 (共 ${field.options.length} 项)..."
                               oninput="handleSearch('${field.key}', this.value)">
                        <span class="badge bg-primary ms-2" id="${field.key}_count">已选: 0</span>
                    </div>
                    <div class="checkbox-scroll-area" id="${field.key}_container"></div>
                </div>`;
            setTimeout(() => renderList(field.key, ''), 0);
        }
        // 2. 复选组 (普通) - 重点修复行为(bhv)的联动
        else if (field.Widget_Type === '复选组' || field.Widget_Type === '多选下拉' || ['bhv', 'channel'].includes(field.key)) {
            selectionCache[field.key] = new Set();

            // 特殊处理：如果 key 是 bhv，必须绑定 updateVisibility
            const changeEvent = field.key === 'bhv' ?
                `toggleSelection('${field.key}', this.value, this.checked); updateVisibility();` :
                `toggleSelection('${field.key}', this.value, this.checked)`;

            const optionsHtml = (field.options || []).map(opt => `
                <input type="checkbox" class="checkbox-btn" value="${opt}" id="${field.key}_${opt}" onchange="${changeEvent}">
                <label for="${field.key}_${opt}">${opt}</label>
            `).join('');
            widgetHtml = `<div class="checkbox-group-container">${optionsHtml}</div>`;
        }
        // 3. 数值切换
        else if (field.Widget_Type === '数值_切换') {
            widgetHtml = `
                <div class="card p-2 bg-light border-0">
                    <div class="btn-group w-100 mb-2">
                        <input type="radio" class="btn-check" name="${field.key}_mode" id="${field.key}_m1" value="unlimited" checked onclick="togglePanel('${field.key}', 'unlimited')">
                        <label class="btn btn-outline-secondary btn-sm" for="${field.key}_m1">不限</label>
                        <input type="radio" class="btn-check" name="${field.key}_mode" id="${field.key}_m2" value="min" onclick="togglePanel('${field.key}', 'min')">
                        <label class="btn btn-outline-secondary btn-sm" for="${field.key}_m2">仅最小值</label>
                        <input type="radio" class="btn-check" name="${field.key}_mode" id="${field.key}_m3" value="range" onclick="togglePanel('${field.key}', 'range')">
                        <label class="btn btn-outline-secondary btn-sm" for="${field.key}_m3">区间</label>
                    </div>
                    <div id="${field.key}_inputs">
                        <div class="text-muted small text-center py-2" data-mode="unlimited">不做限制</div>
                        <div class="input-group d-none" data-mode="min">
                            <span class="input-group-text">≥</span>
                            <input type="number" class="form-control" name="${field.key}_min" placeholder="最小值">
                        </div>
                        <div class="input-group d-none" data-mode="range">
                            <input type="number" class="form-control" name="${field.key}_range_min" placeholder="最小">
                            <span class="input-group-text">-</span>
                            <input type="number" class="form-control" name="${field.key}_range_max" placeholder="最大">
                        </div>
                    </div>
                </div>`;
        }
        // 4. 日期切换
        else if (field.Widget_Type === '日期_切换') {
            widgetHtml = `
                <div class="card p-2 bg-light border-0">
                    <div class="btn-group w-100 mb-2">
                        <input type="radio" class="btn-check" name="${field.key}_mode" id="${field.key}_d1" value="recent" checked onclick="togglePanel('${field.key}_d', 'recent')">
                        <label class="btn btn-outline-secondary btn-sm" for="${field.key}_d1">最近几天</label>
                        <input type="radio" class="btn-check" name="${field.key}_mode" id="${field.key}_d2" value="range" onclick="togglePanel('${field.key}_d', 'range')">
                        <label class="btn btn-outline-secondary btn-sm" for="${field.key}_d2">日期区间</label>
                    </div>
                    <div id="${field.key}_inputs">
                        <div class="input-group" data-mode="recent">
                            <span class="input-group-text">最近</span>
                            <input type="number" class="form-control" name="${field.key}_days" value="30">
                            <span class="input-group-text">天</span>
                        </div>
                        <div class="input-group d-none" data-mode="range">
                            <input type="date" class="form-control" name="${field.key}_start">
                            <span class="input-group-text">至</span>
                            <input type="date" class="form-control" name="${field.key}_end">
                        </div>
                    </div>
                </div>`;
        }
        else {
            widgetHtml = `<input type="text" class="form-control" name="${field.key}">`;
        }

        wrapper.innerHTML = label + widgetHtml;
        container.appendChild(wrapper);
    }

    // 【核心修复】显隐逻辑
    function updateVisibility() {
        // 1. 获取选中的行为 (例如：['购买', '收藏'])
        const selectedBehaviors = Array.from(selectionCache['bhv'] || []);

        let visibleFields = new Set();

        // 2. 如果没有选行为，只看默认值。如果选了，计算交集。
        if (selectedBehaviors.length > 0) {
            // 初始化交集为第一个选中行为的字段
            const firstBhv = selectedBehaviors[0];
            let intersection = new Set(logicMatrix[firstBhv] || []);

            // 依次与其他选中行为求交集
            for (let i = 1; i < selectedBehaviors.length; i++) {
                const bhv = selectedBehaviors[i];
                const fields = new Set(logicMatrix[bhv] || []);
                // 过滤：保留两个集合都有的字段
                intersection = new Set([...intersection].filter(x => fields.has(x)));
            }
            visibleFields = intersection;
        }

        // 3. 应用 DOM 操作
        document.querySelectorAll('.field-wrapper').forEach(el => {
            const fieldKey = el.id.replace('field_wrapper_', '');
            // 只要是默认字段 (如 bhv, cate, brand) 或者 在交集中，就显示
            const isDefault = (el.dataset.isDefault === 'true');

            if (isDefault || visibleFields.has(fieldKey)) {
                el.classList.remove('hidden');
            } else {
                el.classList.add('hidden');
            }
        });
    }

    function renderList(key, filterText) {
        const container = document.getElementById(`${key}_container`);
        if (!container) return;
        const allData = optionCache[key] || [];
        const selectedSet = selectionCache[key];
        let filteredData = allData;
        if (filterText) filteredData = allData.filter(item => item.toLowerCase().includes(filterText.toLowerCase()));

        const displayData = filteredData.slice(0, 100);
        const html = displayData.map(opt => {
            const isChecked = selectedSet.has(opt) ? 'checked' : '';
            return `<div class="form-check">
                    <input class="form-check-input" type="checkbox" ${isChecked}
                           onchange="toggleSelection('${key}', '${opt}', this.checked)">
                    <label class="form-check-label text-break">${opt}</label>
                </div>`;
        }).join('');
        container.innerHTML = html;
    }

    let searchTimer = null;
    function handleSearch(key, val) {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => renderList(key, val), 300);
    }

    window.toggleSelection = (key, val, isChecked) => {
        const set = selectionCache[key];
        if (isChecked) set.add(val); else set.delete(val);
        const countEl = document.getElementById(`${key}_count`);
        if (countEl) countEl.textContent = `已选: ${set.size}`;
    };

    window.togglePanel = (key, mode) => {
        const actualKey = key.endsWith('_d') ? key.slice(0, -2) : key;
        const container = document.getElementById(`${actualKey}_inputs`);
        if(container) {
            container.querySelectorAll('div[data-mode]').forEach(div => {
                div.classList.toggle('d-none', div.getAttribute('data-mode') !== mode);
            });
        }
    };

    async function submitForm() {
        const formData = new FormData(document.getElementById('dynamicForm'));
        const payload = {};

        document.querySelectorAll('.field-wrapper').forEach(wrapper => {
            if (wrapper.classList.contains('hidden')) return;
            const key = wrapper.id.replace('field_wrapper_', '');

            if (selectionCache[key]) {
                const set = selectionCache[key];
                if (set.size > 0) payload[key] = Array.from(set);
            }
            else if (document.querySelector(`input[name="${key}_mode"]`)) {
                const modeInput = document.querySelector(`input[name="${key}_mode"]:checked`);
                if (modeInput) {
                     if (document.querySelector(`input[name="${key}_days"]`)) {
                         const mode = modeInput.value;
                         if (mode === 'recent') payload[key] = { val: { days: formData.get(`${key}_days`) }, min: "recent" };
                         else payload[key] = { val: { start: formData.get(`${key}_start`), end: formData.get(`${key}_end`) }, min: "range" };
                     } else {
                         const mode = modeInput.value;
                         if (mode === 'unlimited') payload[key] = { min: "", max: "" };
                         else if (mode === 'min') payload[key] = { min: formData.get(`${key}_min`), max: "" };
                         else if (mode === 'range') payload[key] = { min: formData.get(`${key}_range_min`), max: formData.get(`${key}_range_max`) };
                     }
                }
            }
            else {
                const val = formData.get(key);
                if (val) payload[key] = val;
            }
        });

        const res = await fetch('/api/generate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        const jsonCode = await res.json();
        document.getElementById('jsonResult').textContent = JSON.stringify(jsonCode, null, 2);
    }
</script>
</body>
</html>
